<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Obras — Admin BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="admin-body">
<div class="admin-layout">

  <div th:replace="~{admin/fragments/sidebar :: sidebar('works')}"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1 class="admin-page-title">Obras</h1>
        <p class="admin-page-subtitle">Catálogo completo de libros, manga y cómics</p>
      </div>
    </div>

    <div class="admin-card">
      <div class="admin-card-header">
        <p class="admin-card-title">
          Todas las obras
          <span style="font-size:0.8rem; color:var(--color-outline); font-weight:400; margin-left:0.5rem;"
                th:text="'(' + ${#lists.size(works)} + ' total)'"></span>
        </p>
      </div>
      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Portada</th>
              <th>Título</th>
              <th>Tipo</th>
              <th>Género</th>
              <th>Demografía</th>
              <th>Publicación</th>
              <th>Rating</th>
              <th>Autores</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="work : ${works}">
              <td>
                <div class="admin-work-thumb"
                     th:style="${work.img != null and !work.img.isEmpty()} ? 'background-image:url(' + ${work.img} + ')' : ''">
                  <span th:if="${work.img == null or work.img.isEmpty()}"
                        class="material-symbols-outlined"
                        style="font-size:1rem; color:var(--color-outline);">menu_book</span>
                </div>
              </td>
              <td>
                <span style="font-size:0.85rem; font-weight:600; color:var(--bs-primary);"
                      th:text="${work.title}">—</span>
              </td>
              <td>
                <span class="admin-badge" th:text="${work.type != null} ? ${work.type.name()} : '—'">—</span>
              </td>
              <td style="font-size:0.82rem;"
                  th:text="${work.genre != null} ? ${#strings.replace(work.genre.name(), '_', ' ')} : '—'">—</td>
              <td style="font-size:0.82rem;"
                  th:text="${work.demographic != null} ? ${work.demographic.name()} : '—'">—</td>
              <td style="font-size:0.82rem;"
                  th:text="${work.publicationDate != null} ? ${#temporals.format(work.publicationDate, 'dd/MM/yyyy')} : '—'">—</td>
              <td>
                <span th:if="${work.averageRating != null}"
                      style="font-size:0.82rem; color:#2d7a4f; font-weight:600;"
                      th:text="${#numbers.formatDecimal(work.averageRating, 1, 1)} + ' ★'">—</span>
                <span th:unless="${work.averageRating != null}" style="color:var(--color-outline);">—</span>
              </td>
              <td style="font-size:0.82rem;"
                  th:text="${work.authors != null and !work.authors.isEmpty()} ? ${#strings.listJoin(work.authors, ', ')} : '—'">—</td>
            </tr>
            <tr th:if="${works == null or works.isEmpty()}">
              <td colspan="8" class="text-center py-4" style="color:var(--color-outline); font-size:0.85rem;">
                No hay obras registradas
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
