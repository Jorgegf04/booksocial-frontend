<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pedidos — Admin BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="admin-body">
<div class="admin-layout">

  <div th:replace="~{admin/fragments/sidebar :: sidebar('orders')}"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1 class="admin-page-title">Pedidos</h1>
        <p class="admin-page-subtitle">Historial completo de pedidos</p>
      </div>
    </div>

    <div class="admin-card">
      <div class="admin-card-header">
        <p class="admin-card-title">Todos los pedidos
          <span style="font-size:0.8rem; color:var(--color-outline); font-weight:400; margin-left:0.5rem;"
                th:text="'(' + ${#lists.size(orders)} + ' total)'"></span>
        </p>
      </div>
      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Usuario</th>
              <th>Fecha</th>
              <th>Artículos</th>
              <th>Total</th>
              <th>Líneas</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="order : ${orders}">
              <td style="font-weight:700; color:var(--bs-primary);" th:text="'#' + ${order.id}">#1</td>
              <td style="font-size:0.85rem;" th:text="${order.username != null} ? ${order.username} : '—'">—</td>
              <td style="font-size:0.82rem;"
                  th:text="${order.date != null} ? ${#temporals.format(order.date, 'dd/MM/yyyy HH:mm')} : '—'">—</td>
              <td style="font-size:0.82rem;" th:text="${order.totalItems != null} ? ${order.totalItems} : '—'">—</td>
              <td style="font-weight:700; color:#2d7a4f;"
                  th:text="'€' + ${#numbers.formatDecimal(order.total != null ? order.total : 0, 1, 2)}">€0.00</td>
              <td>
                <div th:if="${order.orderLines != null and !order.orderLines.isEmpty()}"
                     style="font-size:0.75rem; color:var(--color-muted);">
                  <span th:each="line, lineStat : ${order.orderLines}"
                        th:if="${lineStat.index < 2}">
                    <span th:text="${line.workTitle}">—</span>
                    <span th:if="!${lineStat.last} and ${lineStat.index < 1}">, </span>
                  </span>
                  <span th:if="${#lists.size(order.orderLines) > 2}"
                        th:text="' +' + (${#lists.size(order.orderLines)} - 2) + ' más'">
                  </span>
                </div>
              </td>
            </tr>
            <tr th:if="${orders == null or orders.isEmpty()}">
              <td colspan="6" class="text-center py-4" style="color:var(--color-outline); font-size:0.85rem;">
                No hay pedidos registrados
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
