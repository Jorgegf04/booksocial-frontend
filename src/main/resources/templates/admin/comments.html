<!--
  Vista: Moderación de comentarios — /admin/comments
  Acceso restringido: AdminInterceptor (role=ADMIN).

  Variables del modelo:
  - comments : List<CommentResponseDTO> todos los comentarios del sistema.

  Cada CommentResponseDTO expone: id, content, userId, username, workId, workTitle,
  parentId (null si es comentario raíz), date, reactionCount.

  Permite al administrador ver y eliminar cualquier comentario del sistema,
  incluidos comentarios jerárquicos (respuestas a otros comentarios indicadas por parentId != null).
  El sidebar se incluye con sidebar('comments') para marcar el item activo.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comentarios — Admin BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="admin-body">
<div class="admin-layout">

  <div th:replace="~{admin/fragments/sidebar :: sidebar('comments')}"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1 class="admin-page-title">Comentarios</h1>
        <p class="admin-page-subtitle">Moderación de comentarios de la comunidad</p>
      </div>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mx-0 mb-3" role="alert">
      <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mx-0 mb-3" role="alert">
      <span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="admin-card">
      <div class="admin-card-header">
        <p class="admin-card-title">
          Todos los comentarios
          <span style="font-size:0.8rem; color:var(--color-outline); font-weight:400; margin-left:0.5rem;"
                th:text="'(' + ${#lists.size(comments)} + ' total)'"></span>
        </p>
      </div>
      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Usuario</th>
              <th>Obra</th>
              <th>Contenido</th>
              <th>Fecha</th>
              <th>Editado</th>
              <th>Respuestas</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="comment : ${comments}">
              <td style="font-size:0.8rem; color:var(--color-outline);" th:text="${comment.id}">—</td>
              <td>
                <span style="font-size:0.82rem; font-weight:600; color:var(--bs-primary);"
                      th:text="${comment.username != null} ? ${comment.username} : '—'">—</span>
              </td>
              <td style="font-size:0.82rem;" th:text="${comment.workTitle != null} ? ${comment.workTitle} : '—'">—</td>
              <td style="font-size:0.82rem; max-width:28rem;">
                <span th:if="${comment.content != null}"
                      th:text="${#strings.length(comment.content) > 120} ? ${#strings.substring(comment.content, 0, 120)} + '…' : ${comment.content}">—</span>
              </td>
              <td style="font-size:0.78rem; color:var(--color-outline); white-space:nowrap;"
                  th:text="${comment.date != null} ? ${#temporals.format(comment.date, 'dd/MM/yyyy HH:mm')} : '—'">—</td>
              <td>
                <span th:if="${comment.edited}" style="font-size:0.75rem; color:#a07000; font-weight:600;">Editado</span>
                <span th:unless="${comment.edited}" style="font-size:0.75rem; color:var(--color-outline);">—</span>
              </td>
              <td>
                <span class="admin-badge"
                      th:text="${comment.replies != null} ? ${#lists.size(comment.replies)} + ' resp.' : '0'">0</span>
              </td>
              <td>
                <button type="button" class="btn btn-sm btn-outline-danger p-1"
                        title="Eliminar comentario"
                        data-bs-toggle="modal" data-bs-target="#deleteCommentModal"
                        th:data-id="${comment.id}"
                        th:data-username="${comment.username}"
                        onclick="openDeleteCommentModal(this)">
                  <span class="material-symbols-outlined" style="font-size:0.9rem;">delete</span>
                </button>
              </td>
            </tr>
            <tr th:if="${comments == null or comments.isEmpty()}">
              <td colspan="8" class="text-center py-4" style="color:var(--color-outline); font-size:0.85rem;">
                No hay comentarios registrados
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal: Eliminar Comentario -->
<div class="modal fade" id="deleteCommentModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Eliminar Comentario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p style="font-size:0.9rem;">¿Seguro que quieres eliminar el comentario de
          <strong id="deleteCommentUser"></strong>?
          Esta acción no se puede deshacer.
        </p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <form id="deleteCommentForm" method="post" class="d-inline">
          <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function openDeleteCommentModal(btn) {
    document.getElementById('deleteCommentForm').action = '/admin/comments/' + btn.dataset.id + '/delete';
    document.getElementById('deleteCommentUser').textContent = '"' + (btn.dataset.username || 'este usuario') + '"';
  }
</script>
</body>
</html>
