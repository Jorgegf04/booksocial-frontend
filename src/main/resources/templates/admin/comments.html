<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comentarios — Admin BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="admin-body">
<div class="admin-layout">

  <div th:replace="~{admin/fragments/sidebar :: sidebar('comments')}"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1 class="admin-page-title">Comentarios</h1>
        <p class="admin-page-subtitle">Moderación de comentarios de la comunidad</p>
      </div>
    </div>

    <div class="admin-card">
      <div class="admin-card-header">
        <p class="admin-card-title">
          Todos los comentarios
          <span style="font-size:0.8rem; color:var(--color-outline); font-weight:400; margin-left:0.5rem;"
                th:text="'(' + ${#lists.size(comments)} + ' total)'"></span>
        </p>
      </div>
      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Usuario</th>
              <th>Obra</th>
              <th>Contenido</th>
              <th>Fecha</th>
              <th>Editado</th>
              <th>Respuestas</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="comment : ${comments}">
              <td style="font-size:0.8rem; color:var(--color-outline);" th:text="${comment.id}">—</td>
              <td>
                <span style="font-size:0.82rem; font-weight:600; color:var(--bs-primary);"
                      th:text="${comment.username != null} ? ${comment.username} : '—'">—</span>
              </td>
              <td style="font-size:0.82rem;" th:text="${comment.workTitle != null} ? ${comment.workTitle} : '—'">—</td>
              <td style="font-size:0.82rem; max-width:28rem;">
                <span th:if="${comment.content != null}"
                      th:text="${#strings.length(comment.content) > 120} ? ${#strings.substring(comment.content, 0, 120)} + '…' : ${comment.content}">—</span>
              </td>
              <td style="font-size:0.78rem; color:var(--color-outline); white-space:nowrap;"
                  th:text="${comment.date != null} ? ${#temporals.format(comment.date, 'dd/MM/yyyy HH:mm')} : '—'">—</td>
              <td>
                <span th:if="${comment.edited}" style="font-size:0.75rem; color:#a07000; font-weight:600;">Editado</span>
                <span th:unless="${comment.edited}" style="font-size:0.75rem; color:var(--color-outline);">—</span>
              </td>
              <td>
                <span class="admin-badge"
                      th:text="${comment.replies != null} ? ${#lists.size(comment.replies)} + ' resp.' : '0'">0</span>
              </td>
            </tr>
            <tr th:if="${comments == null or comments.isEmpty()}">
              <td colspan="7" class="text-center py-4" style="color:var(--color-outline); font-size:0.85rem;">
                No hay comentarios registrados
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
