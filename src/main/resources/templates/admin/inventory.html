<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventario — Admin BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="admin-body">
<div class="admin-layout">

  <div th:replace="~{admin/fragments/sidebar :: sidebar('inventory')}"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1 class="admin-page-title">Inventario</h1>
        <p class="admin-page-subtitle">Productos disponibles y estado de stock</p>
      </div>
    </div>

    <div class="admin-card">
      <div class="admin-card-header">
        <p class="admin-card-title">Productos disponibles
          <span style="font-size:0.8rem; color:var(--color-outline); font-weight:400; margin-left:0.5rem;"
                th:text="'(' + ${#lists.size(products)} + ' total)'"></span>
        </p>
      </div>
      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Obra</th>
              <th>Editorial</th>
              <th>ISBN</th>
              <th>Precio</th>
              <th>Stock</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="p : ${products}">
              <td>
                <div style="font-size:0.85rem; font-weight:600; color:var(--bs-primary);"
                     th:text="${p.workTitle}">—</div>
                <div style="font-size:0.75rem; color:var(--color-outline);"
                     th:text="${p.editionTitle != null} ? ${p.editionTitle} : ''">
                </div>
              </td>
              <td style="font-size:0.82rem;" th:text="${p.editorialName}">—</td>
              <td style="font-size:0.78rem; font-family:monospace; color:var(--color-muted);"
                  th:text="${p.editionIsbn != null} ? ${p.editionIsbn} : '—'">—</td>
              <td style="font-weight:700; color:#2d7a4f;"
                  th:text="'€' + ${#numbers.formatDecimal(p.price != null ? p.price : 0, 1, 2)}">€0.00</td>
              <td>
                <span class="admin-stock-badge"
                      th:classappend="${p.stock == 0} ? 'admin-stock-empty' : (${p.stock <= 5} ? 'admin-stock-low' : 'admin-stock-ok')"
                      th:text="${p.stock} + ' uds.'">0</span>
              </td>
            </tr>
            <tr th:if="${products == null or products.isEmpty()}">
              <td colspan="5" class="text-center py-4" style="color:var(--color-outline); font-size:0.85rem;">
                No hay productos disponibles
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
