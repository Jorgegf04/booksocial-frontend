<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Autores — Admin BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="admin-body">
<div class="admin-layout">

  <div th:replace="~{admin/fragments/sidebar :: sidebar('authors')}"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1 class="admin-page-title">Autores</h1>
        <p class="admin-page-subtitle">Gestión de autores del catálogo</p>
      </div>
    </div>

    <div class="admin-card">
      <div class="admin-card-header">
        <p class="admin-card-title">
          Todos los autores
          <span style="font-size:0.8rem; color:var(--color-outline); font-weight:400; margin-left:0.5rem;"
                th:text="'(' + ${#lists.size(authors)} + ' total)'"></span>
        </p>
      </div>
      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Nacionalidad</th>
              <th>Fecha nacimiento</th>
              <th>Nº obras</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="author : ${authors}">
              <td style="font-size:0.8rem; color:var(--color-outline);" th:text="${author.id}">—</td>
              <td>
                <span style="font-size:0.85rem; font-weight:600; color:var(--bs-primary);"
                      th:text="${author.name}">—</span>
              </td>
              <td style="font-size:0.82rem;" th:text="${author.nationality != null} ? ${author.nationality} : '—'">—</td>
              <td style="font-size:0.82rem;"
                  th:text="${author.birthDate != null} ? ${#temporals.format(author.birthDate, 'dd/MM/yyyy')} : '—'">—</td>
              <td>
                <span class="admin-badge"
                      th:text="${author.works != null} ? ${#lists.size(author.works)} + ' obras' : '0 obras'">0</span>
              </td>
            </tr>
            <tr th:if="${authors == null or authors.isEmpty()}">
              <td colspan="5" class="text-center py-4" style="color:var(--color-outline); font-size:0.85rem;">
                No hay autores registrados
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
