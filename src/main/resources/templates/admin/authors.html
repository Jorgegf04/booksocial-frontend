<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Autores — Admin BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="admin-body">
<div class="admin-layout">

  <div th:replace="~{admin/fragments/sidebar :: sidebar('authors')}"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1 class="admin-page-title">Autores</h1>
        <p class="admin-page-subtitle">Gestión de autores del catálogo</p>
      </div>
      <button class="btn btn-sm btn-primary d-flex align-items-center gap-1"
              data-bs-toggle="modal" data-bs-target="#createAuthorModal">
        <span class="material-symbols-outlined" style="font-size:1rem;">add</span>
        Nuevo Autor
      </button>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mx-0 mb-3" role="alert">
      <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mx-0 mb-3" role="alert">
      <span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="admin-card">
      <div class="admin-card-header">
        <p class="admin-card-title">
          Todos los autores
          <span style="font-size:0.8rem; color:var(--color-outline); font-weight:400; margin-left:0.5rem;"
                th:text="'(' + ${#lists.size(authors)} + ' total)'"></span>
        </p>
      </div>
      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Nacionalidad</th>
              <th>Fecha nacimiento</th>
              <th>Nº obras</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="author : ${authors}">
              <td style="font-size:0.8rem; color:var(--color-outline);" th:text="${author.id}">—</td>
              <td>
                <span style="font-size:0.85rem; font-weight:600; color:var(--bs-primary);"
                      th:text="${author.name}">—</span>
              </td>
              <td style="font-size:0.82rem;" th:text="${author.nationality != null} ? ${author.nationality} : '—'">—</td>
              <td style="font-size:0.82rem;"
                  th:text="${author.birthDate != null} ? ${#temporals.format(author.birthDate, 'dd/MM/yyyy')} : '—'">—</td>
              <td>
                <span class="admin-badge"
                      th:text="${author.works != null} ? ${#lists.size(author.works)} + ' obras' : '0 obras'">0</span>
              </td>
              <td>
                <div class="d-flex gap-1">
                  <button type="button" class="btn btn-sm btn-outline-secondary p-1"
                          title="Editar"
                          data-bs-toggle="modal" data-bs-target="#editAuthorModal"
                          th:data-id="${author.id}"
                          th:data-name="${author.name}"
                          th:data-nationality="${author.nationality}"
                          th:data-birthdate="${author.birthDate}"
                          onclick="openEditAuthorModal(this)">
                    <span class="material-symbols-outlined" style="font-size:0.9rem;">edit</span>
                  </button>
                  <button type="button" class="btn btn-sm btn-outline-danger p-1"
                          title="Eliminar"
                          data-bs-toggle="modal" data-bs-target="#deleteAuthorModal"
                          th:data-id="${author.id}"
                          th:data-name="${author.name}"
                          onclick="openDeleteAuthorModal(this)">
                    <span class="material-symbols-outlined" style="font-size:0.9rem;">delete</span>
                  </button>
                </div>
              </td>
            </tr>
            <tr th:if="${authors == null or authors.isEmpty()}">
              <td colspan="6" class="text-center py-4" style="color:var(--color-outline); font-size:0.85rem;">
                No hay autores registrados
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal: Crear Autor -->
<div class="modal fade" id="createAuthorModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nuevo Autor</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form method="post" th:action="@{/admin/authors/create}">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
              <input type="text" name="name" class="form-control form-control-sm" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Nacionalidad</label>
              <input type="text" name="nationality" class="form-control form-control-sm"
                     placeholder="Ej: Japonesa">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Fecha de nacimiento</label>
              <input type="date" name="birthDate" class="form-control form-control-sm">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-sm btn-primary">Crear Autor</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal: Editar Autor -->
<div class="modal fade" id="editAuthorModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar Autor</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="editAuthorForm" method="post">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
              <input type="text" id="editAuthorName" name="name" class="form-control form-control-sm" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Nacionalidad</label>
              <input type="text" id="editAuthorNationality" name="nationality" class="form-control form-control-sm">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Fecha de nacimiento</label>
              <input type="date" id="editAuthorBirthDate" name="birthDate" class="form-control form-control-sm">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-sm btn-primary">Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal: Eliminar Autor -->
<div class="modal fade" id="deleteAuthorModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Eliminar Autor</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p style="font-size:0.9rem;">¿Seguro que quieres eliminar a
          <strong id="deleteAuthorName"></strong>?
          Esta acción no se puede deshacer.
        </p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <form id="deleteAuthorForm" method="post" class="d-inline">
          <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function openEditAuthorModal(btn) {
    document.getElementById('editAuthorForm').action = '/admin/authors/' + btn.dataset.id + '/update';
    document.getElementById('editAuthorName').value = btn.dataset.name || '';
    document.getElementById('editAuthorNationality').value = btn.dataset.nationality || '';
    document.getElementById('editAuthorBirthDate').value = btn.dataset.birthdate || '';
  }

  function openDeleteAuthorModal(btn) {
    document.getElementById('deleteAuthorForm').action = '/admin/authors/' + btn.dataset.id + '/delete';
    document.getElementById('deleteAuthorName').textContent = '"' + btn.dataset.name + '"';
  }
</script>
</body>
</html>
