<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    html, body { height: 100%; margin: 0; }

    .auth-wrapper {
      min-height: 100vh;
      display: flex;
    }

    /* Panel izquierdo decorativo */
    .auth-panel {
      width: 42%;
      background: linear-gradient(160deg, #1a3328 0%, #2D4C3E 50%, #3a6050 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem 3.5rem;
      position: relative;
      overflow: hidden;
    }

    .auth-panel::before {
      content: '';
      position: absolute;
      top: -120px; right: -120px;
      width: 360px; height: 360px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }

    .auth-panel::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -80px;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }

    .auth-brand {
      font-family: 'Noto Serif', serif;
      font-style: italic;
      font-size: 1.7rem;
      color: #c0ecda;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .auth-brand span { color: #fff; }

    .auth-panel-middle { position: relative; z-index: 1; }

    .auth-panel-quote {
      font-family: 'Noto Serif', serif;
      font-style: italic;
      font-size: 1.55rem;
      color: rgba(255,255,255,0.92);
      line-height: 1.5;
      margin-bottom: 1rem;
    }

    .auth-panel-sub {
      font-size: 0.82rem;
      color: rgba(192, 236, 218, 0.75);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .auth-panel-footer {
      font-size: 0.78rem;
      color: rgba(192,236,218,0.5);
    }

    /* Panel derecho con formulario */
    .auth-form-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
      background-color: var(--color-bg);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
    }

    .auth-card-title {
      font-family: 'Noto Serif', serif;
      font-size: 1.75rem;
      color: var(--color-text);
      margin-bottom: 0.25rem;
    }

    .auth-card-sub {
      font-size: 0.85rem;
      color: var(--color-outline);
      margin-bottom: 2rem;
    }

    .auth-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--color-muted);
      margin-bottom: 0.35rem;
    }

    .auth-input {
      background: var(--color-surface);
      border: 1.5px solid var(--color-outline-l);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.9rem;
      color: var(--color-text);
      transition: border-color .15s, box-shadow .15s;
    }

    .auth-input:focus {
      border-color: var(--bs-primary);
      box-shadow: 0 0 0 3px rgba(45,76,62,0.12);
      background: #fff;
      outline: none;
    }

    .auth-btn {
      background: var(--bs-primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      width: 100%;
      transition: background .15s, transform .1s;
    }

    .auth-btn:hover {
      background: #1a3328;
      transform: translateY(-1px);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--color-outline-l);
      font-size: 0.78rem;
      margin: 1.25rem 0;
    }

    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-outline-l);
    }

    .auth-link {
      font-size: 0.85rem;
      color: var(--bs-primary);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-link:hover { text-decoration: underline; }

    .auth-input-group { position: relative; }

    .auth-pw-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--color-outline);
      cursor: pointer;
      padding: 0;
      font-size: 1rem;
      line-height: 1;
    }

    @media (max-width: 768px) {
      .auth-panel { display: none; }
    }
  </style>
</head>
<body>
<div class="auth-wrapper">

  <!-- Panel decorativo izquierdo -->
  <div class="auth-panel">
    <div class="auth-brand"><span>Book</span>Social</div>

    <div class="auth-panel-middle">
      <p class="auth-panel-quote">
        "Un libro es un sueño que tienes en tus manos."
      </p>
      <p class="auth-panel-sub">Neil Gaiman</p>
    </div>

    <p class="auth-panel-footer">
      © 2026 BookSocial — El Curador Digital
    </p>
  </div>

  <!-- Formulario derecho -->
  <div class="auth-form-side">
    <div class="auth-card">

      <h1 class="auth-card-title">Bienvenido de nuevo</h1>
      <p class="auth-card-sub">Inicia sesión para acceder a tu biblioteca</p>

      <!-- Flash success (tras registro) -->
      <div th:if="${success}" class="alert alert-success py-2 mb-3" style="font-size:0.85rem;" th:text="${success}"></div>

      <!-- Error -->
      <div th:if="${error}" class="alert alert-danger py-2 mb-3" style="font-size:0.85rem;" th:text="${error}"></div>

      <form th:action="@{/auth/login}" th:object="${loginRequest}" method="post">
        <div class="mb-3">
          <label class="auth-label">Nombre de usuario</label>
          <input type="text"
                 th:field="*{username}"
                 class="form-control auth-input"
                 placeholder="tu_usuario"
                 autocomplete="username"
                 required>
        </div>

        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center">
            <label class="auth-label mb-0">Contraseña</label>
          </div>
          <div class="auth-input-group mt-1">
            <input type="password"
                   id="loginPassword"
                   th:field="*{password}"
                   class="form-control auth-input"
                   placeholder="••••••••"
                   autocomplete="current-password"
                   required>
            <button type="button" class="auth-pw-toggle" onclick="togglePw('loginPassword', this)"
                    title="Mostrar/ocultar contraseña">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="auth-btn">Iniciar sesión</button>
      </form>

      <div class="auth-divider">o</div>

      <p class="text-center mb-0" style="font-size:0.85rem; color:var(--color-muted);">
        ¿No tienes cuenta?
        <a href="/auth/register" class="auth-link ms-1">Crear cuenta</a>
      </p>
    </div>
  </div>

</div>

<script>
  function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
